name: RFC Proposal
description: Submit a Request For Comments (RFC) for a major change or architectural design
title: "[RFC]: "
labels: ["rfc", "design"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for submitting an RFC for UME! Please follow the template below.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One paragraph explanation of the feature.
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why are we doing this? What use cases does it support? What is the expected outcome?
    validations:
      required: true
  - type: textarea
    id: design
    attributes:
      label: Detailed Design
      description: This is the bulk of the RFC. Explain the design in enough detail for somebody familiar with UME to understand.
    validations:
      required: true
  - type: textarea
    id: drawbacks
    attributes:
      label: Drawbacks
      description: Why should we *not* do this?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: What other designs have been considered? What is the impact of not doing this?
    validations:
      required: true
  - type: textarea
    id: unresolved
    attributes:
      label: Unresolved Questions
      description: What parts of the design are still to be determined?
    validations:
      required: false
