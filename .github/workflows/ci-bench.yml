name: 'Benchmarks'

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-17 ninja-build cmake

      - name: Configure CMake
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_C_COMPILER=clang-17 \
            -DCMAKE_CXX_COMPILER=clang++-17 \
            -DCMAKE_BUILD_TYPE=Release \
            -DUME_BUILD_TESTS=OFF \
            -DUME_BUILD_BENCHMARKS=ON

      - name: Build Benchmarks
        run: cmake --build build --target ume_benchmarks --parallel

      - name: Run Benchmarks
        run: ./build/benchmarks/ume_benchmarks --benchmark_format=json > benchmark_results.json

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark_results.json
