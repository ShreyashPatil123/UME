name: 'Format Check'

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  check-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-17
      - name: Run clang-format check
        run: |
          find core -type f \( -name '*.h' -o -name '*.cpp' -o -name '*.c' \) | xargs -r clang-format-17 --dry-run --Werror
